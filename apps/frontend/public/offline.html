<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2E221B" />
    <title>Offline | calculators@TrueMFD</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(135deg, #2E221B, #130d08);
        color: #F4EFE8;
        font-family: Lato, Arial, sans-serif;
      }
      main {
        max-width: 460px;
        text-align: center;
      }
      img {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        object-fit: cover;
      }
      h1 {
        color: #B08D57;
        font-family: Georgia, serif;
        font-size: 32px;
      }
      p {
        color: #DDD1C2;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        margin-top: 14px;
        padding: 12px 18px;
        border-radius: 8px;
        background: #B08D57;
        color: #2E221B;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/icon-192.png" alt="TrueMFD" />
      <h1>You are offline</h1>
      <p>The TrueMFD calculator app shell is available, but live calculator verification needs an internet connection.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
