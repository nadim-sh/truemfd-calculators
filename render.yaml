services:
  - type: web
    name: truemfd-calculators-api
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
  - type: static
    name: truemfd-calculators-web
    rootDir: apps/frontend
    buildCommand: pnpm install --frozen-lockfile=false && pnpm build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: truemfd-calculators-api
          property: host
